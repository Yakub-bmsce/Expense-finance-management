services:
  - type: web
    name: flatsplit-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: flatsplit-production-jwt-secret-2024
      - key: FRONTEND_URL
        value: https://frontend-nine-sepia-68.vercel.app
